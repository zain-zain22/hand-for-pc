<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PC Writing Board - Smooth Hand Fix</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden !important; background: #222; 
            cursor: none; /* PC കഴ്സർ പൂർണ്ണമായും ഒളിപ്പിച്ചു */
        }
        
        /* ബട്ടണുകളിലും സ്ലൈഡറുകളിലും സാധാരണ മൗസ് വരാൻ */
        #toolbar, #bottom-controls, button, input { cursor: default; } 

        #toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: white; padding: 10px; display: flex; gap: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.4); justify-content: center;
            align-items: center;
        }

        #viewport { width: 100vw; height: 100vh; position: relative; background: #444; overflow: hidden; }
        
        #content-layer {
            position: absolute; width: 5000px; height: 5000px; background: white; 
            top: 50%; left: 50%; margin-top: -2500px; margin-left: -2500px;
        }

        #board { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; touch-action: none; }

        /* കൈകളുടെ സ്റ്റൈൽ */
        .cursor-hand {
            position: fixed;
            pointer-events: none; /* ഇത് വളരെ പ്രധാനം: കൈ മൗസ് ഈവന്റുകളെ തടസ്സപ്പെടുത്തില്ല */
            z-index: 9999;
            width: 200px; 
            display: none;
            transform-origin: 0 0;
            /* ബ്ലിങ്കിങ് ഒഴിവാക്കാൻ ഹാർഡ്‌വെയർ ആക്സിലറേഷൻ */
            backface-visibility: hidden;
            -webkit-font-smoothing: subpixel-antialiased;
        }

        .fade-out { animation: fadeEffect 0.5s forwards; animation-delay: 0.5s; }
        @keyframes fadeEffect { from { opacity: 1; } to { opacity: 0; } }

        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #f0f0f0; font-weight: bold; }
    </style>
</head>
<body>

<div id="toolbar">
    <button onclick="undo()">Undo</button>
    <button onclick="clearBoard()" style="background:#ff4444; color:white; border:none;">Clear All</button>
    <div style="display:flex; align-items:center; gap:5px;">
        <span>Color:</span>
        <input type="color" id="colorPicker" value="#000000" onchange="currentColor = this.value">
    </div>
    <div style="display:flex; align-items:center; gap:5px;">
        <span>Pen Size:</span>
        <input type="range" id="penWidth" min="2" max="60" value="10">
    </div>
</div>

<div id="viewport">
    <div id="content-layer">
        <svg id="board" xmlns="http://www.w3.org/2000/svg" width="5000" height="5000"></svg>
    </div>
</div>

<img id="pointing-hand" class="cursor-hand" src="hand-pointing.png" alt="Pointing" />
<img id="writing-hand" class="cursor-hand" src="hand-writing.png" alt="Writing" />

<script>
    const svg = document.getElementById("board");
    const contentLayer = document.getElementById("content-layer");
    const pointingHand = document.getElementById("pointing-hand");
    const writingHand = document.getElementById("writing-hand");
    const penWidthInput = document.getElementById("penWidth");

    let drawing = false;
    let currentColor = "black";
    let strokes = [];
    let currentPath = null;
    let scale = 1;

    // മൗസ് ട്രാക്കിംഗ് - ബ്ലിങ്കിങ് ഒഴിവാക്കാൻ window-ൽ തന്നെ നൽകുന്നു
    window.addEventListener('mousemove', (e) => {
        updateHandPosition(e);
    });

    function updateHandPosition(e) {
        let activeHand;
        let idleHand;

        if (drawing) {
            activeHand = writingHand;
            idleHand = pointingHand;
        } else {
            activeHand = pointingHand;
            idleHand = writingHand;
        }

        // പോസിഷൻ അപ്‌ഡേറ്റ്
        activeHand.style.display = "block";
        idleHand.style.display = "none";

        // വിരലിന്റെ അറ്റം മൗസ് പോയിന്ററിൽ വരാനുള്ള അഡ്ജസ്റ്റ്മെന്റ് 
        // നിങ്ങളുടെ ചിത്രത്തിന് അനുസരിച്ച് -10, -5 എന്നത് മാറ്റാം
        activeHand.style.left = (e.clientX - 10) + "px";
        activeHand.style.top = (e.clientY - 5) + "px";
    }

    // SVG കോർഡിനേറ്റുകൾ കണക്കാക്കാൻ
    function getCoords(e) {
        const rect = contentLayer.getBoundingClientRect();
        return { 
            x: (e.clientX - rect.left) / scale, 
            y: (e.clientY - rect.top) / scale 
        };
    }

    svg.onmousedown = (e) => {
        if (e.buttons === 1) {
            drawing = true;
            const c = getCoords(e);
            
            currentPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            currentPath.setAttribute("d", `M ${c.x} ${c.y}`);
            currentPath.setAttribute("stroke", currentColor);
            currentPath.setAttribute("stroke-width", penWidthInput.value);
            currentPath.setAttribute("fill", "none");
            currentPath.setAttribute("stroke-linecap", "round");
            currentPath.setAttribute("stroke-linejoin", "round");
            
            svg.appendChild(currentPath);
            strokes.push(currentPath);
            
            // ക്ലിക്ക് ചെയ്ത ഉടനെ കൈ മാറാൻ
            updateHandPosition(e);
        }
    };

    // ബോർഡിന് മുകളിലൂടെ നീങ്ങുമ്പോൾ വരയ്ക്കാൻ
    svg.onmousemove = (e) => {
        if (drawing && currentPath) {
            const c = getCoords(e);
            const newD = currentPath.getAttribute("d") + ` L ${c.x} ${c.y}`;
            currentPath.setAttribute("d", newD);
        }
    };

    // മൗസ് വിടുമ്പോൾ
    window.onmouseup = (e) => {
        drawing = false;
        updateHandPosition(e);
    };

    // മൗസ് വിൻഡോയ്ക്ക് പുറത്ത് പോയാൽ കൈകൾ മറയ്ക്കാൻ
    document.addEventListener('mouseleave', () => {
        pointingHand.style.display = "none";
        writingHand.style.display = "none";
    });

    function undo() {
        if (strokes.length > 0) {
            const last = strokes.pop();
            svg.removeChild(last);
        }
    }

    function clearBoard() {
        svg.innerHTML = "";
        strokes = [];
    }
</script>

</body>
</html>
