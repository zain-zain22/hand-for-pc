<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PC Writing Board - Smooth Zoom & Late Fade</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden !important; background: #222; 
            cursor: none; 
        }
        
        #toolbar, button, input { cursor: default; } 

        #toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: white; padding: 10px; display: flex; gap: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.4); justify-content: center;
            align-items: center; flex-wrap: wrap; font-family: sans-serif; font-size: 13px;
        }

        #viewport { 
            width: 100vw; height: 100vh; position: relative; 
            background: #444; overflow: hidden; 
            user-select: none;
        }
        
        #content-layer {
            position: absolute; width: 5000px; height: 5000px; 
            background: white; background-repeat: no-repeat;
            top: 0; left: 0; transform-origin: 0 0;
            /* സ്മൂത്ത് പാനിംഗിന് (നീക്കാൻ) */
            transition: transform 0.1s ease-out; 
        }

        #board { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; touch-action: none; }

        .hand-container { position: fixed; pointer-events: none; z-index: 9999; display: none; }
        .cursor-hand { display: block; }

        .control-group { display: flex; align-items: center; gap: 10px; border-right: 1px solid #ddd; padding-right: 15px; }
        
        #penToggleBtn {
            font-weight: bold; padding: 8px 20px; border-radius: 5px; cursor: pointer;
        }
        .pen-on { background: #4CAF50; color: white; border: none; }
        .pen-off { background: #ff9800; color: white; border: none; }

        .val-display { 
            min-width: 30px; font-weight: bold; color: #1a73e8; 
            background: #e8f0fe; padding: 2px 6px; border-radius: 3px; text-align: center;
        }

        /* ഫേഡ് ഔട്ട് സ്റ്റൈൽ - വരച്ച് തീർന്നതിന് ശേഷം അപ്ലൈ ചെയ്യാൻ */
        .fade-out-active { 
            transition: opacity 2s ease-in-out;
            transition-delay: 1s; /* വരച്ച് തീർന്ന് 1 സെക്കന്റിന് ശേഷം തുടങ്ങും */
            opacity: 0 !important; 
        }
        
        button { padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; background: #f9f9f9; border-radius: 4px; }
    </style>
</head>
<body>

<div id="toolbar">
    <button id="penToggleBtn" class="pen-on" onclick="togglePenMode()">PEN: ON</button>

    <div class="control-group">
        <button onclick="toggleFullScreen()">Full Screen</button>
        <label>Image: <input type="file" id="bgUploader" accept="image/*" style="width: 80px;"></label>
    </div>

    <div class="control-group">
        <span>Pen Size:</span>
        <input type="range" id="penWidth" min="2" max="60" value="10" oninput="updatePenVal()">
        <span id="v-pen" class="val-display">10</span>
        <label style="margin-left:10px;"><input type="checkbox" id="fadeToggle"> Fade Out</label>
        <input type="color" id="colorPicker" value="#000000" style="width:30px;">
    </div>
    
    <button onclick="undo()">Undo</button>
    <button onclick="clearBoard()" style="background:#ff4444; color:white;">Clear</button>
</div>

<div id="viewport">
    <div id="content-layer">
        <svg id="board" xmlns="http://www.w3.org/2000/svg" width="5000" height="5000"></svg>
    </div>
</div>

<div id="pointing-container" class="hand-container">
    <img class="cursor-hand" src="hand-pointing.png" alt="Pointing" style="width: 150px;" />
</div>

<div id="writing-container" class="hand-container">
    <img class="cursor-hand" src="hand-writing.png" alt="Writing" style="width: 350px;" />
</div>

<script>
    const svg = document.getElementById("board");
    const contentLayer = document.getElementById("content-layer");
    const pointingCont = document.getElementById("pointing-container");
    const writingCont = document.getElementById("writing-container");
    const penToggleBtn = document.getElementById("penToggleBtn");

    let isPenMode = true;
    let drawing = false;
    let dragging = false;
    let strokes = [];
    let currentPath = null;
    let lastE = { clientX: 0, clientY: 0 };

    // Zoom & Pan variables
    let scale = 1;
    let posX = 0, posY = 0;
    let startX, startY;

    // സ്ഥിരപ്പെടുത്തിയ നിബ് അലൈൻമെന്റ്
    const NIB_X = -80;
    const NIB_Y = -120;

    function togglePenMode() {
        isPenMode = !isPenMode;
        if (isPenMode) {
            penToggleBtn.innerText = "PEN: ON";
            penToggleBtn.className = "pen-on";
            svg.style.cursor = "none";
        } else {
            penToggleBtn.innerText = "PEN: OFF (DRAG)";
            penToggleBtn.className = "pen-off";
            svg.style.cursor = "move";
        }
    }

    function updatePenVal() {
        document.getElementById("v-pen").innerText = document.getElementById("penWidth").value;
    }

    // *** സ്മൂത്ത് ആയും പതുക്കെയും സൂം ചെയ്യാനുള്ള സൗകര്യം ***
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        
        // സൂം വേഗത വളരെ കുറച്ചു (0.02)
        const zoomSpeed = 0.02; 
        
        if (e.deltaY < 0) {
            // Zoom In
            scale += zoomSpeed;
        } else {
            // Zoom Out (മിനിമം സ്കെയിൽ 0.1 ആയി നിലനിർത്തുന്നു)
            scale = Math.max(0.1, scale - zoomSpeed);
        }
        
        applyTransform();
    }, { passive: false });

    function applyTransform() {
        // transition: transform 0.1s ease-out; CSS-ൽ നൽകിയിട്ടുണ്ട്
        contentLayer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function renderHand(e) {
        lastE = e;
        if (isPenMode) {
            let active = drawing ? writingCont : pointingCont;
            let idle = drawing ? pointingCont : writingCont;
            active.style.display = "block";
            idle.style.display = "none";
            
            if (drawing) {
                active.style.left = (e.clientX + NIB_X) + "px";
                active.style.top = (e.clientY + NIB_Y) + "px";
            } else {
                active.style.left = (e.clientX - 10) + "px";
                active.style.top = (e.clientY - 5) + "px";
            }
        } else {
            pointingCont.style.display = "none";
            writingCont.style.display = "none";
        }
    }

    svg.onmousedown = (e) => {
        if (e.buttons !== 1) return;
        if (isPenMode) {
            drawing = true;
            const c = getCoords(e);
            currentPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            currentPath.setAttribute("d", `M ${c.x} ${c.y}`);
            currentPath.setAttribute("stroke", document.getElementById("colorPicker").value);
            // സ്കെയിൽ അനുസരിച്ച് വിഡ്ത്ത് ക്രമീകരിക്കുന്നു
            currentPath.setAttribute("stroke-width", document.getElementById("penWidth").value / scale); 
            currentPath.setAttribute("fill", "none");
            currentPath.setAttribute("stroke-linecap", "round");
            currentPath.setAttribute("stroke-linejoin", "round");
            
            // ഇവിടെ class ഉടനെ അപ്ലൈ ചെയ്യുന്നില്ല
            
            svg.appendChild(currentPath);
            strokes.push(currentPath);
        } else {
            dragging = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
        }
    };

    window.addEventListener('mousemove', (e) => {
        if (isPenMode) {
            if (drawing && currentPath) {
                const c = getCoords(e);
                currentPath.setAttribute("d", currentPath.getAttribute("d") + ` L ${c.x} ${c.y}`);
            }
            renderHand(e);
        } else if (dragging) {
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            applyTransform();
        }
    });

    window.onmouseup = (e) => { 
        // *** വരച്ച് തീർന്നതിന് ശേഷം ഫേഡ് ഔട്ട് അപ്ലൈ ചെയ്യുന്നു ***
        if (drawing && currentPath && document.getElementById("fadeToggle").checked) {
            let pathToRemove = currentPath;
            // ഫേഡ് ഔട്ട് ക്ലാസ് ചേർക്കുന്നു
            pathToRemove.setAttribute("class", "fade-out-active");
            
            // ഫേഡ് ഔട്ട് കഴിഞ്ഞാൽ (ട്രാൻസിഷൻ സമയം കഴിഞ്ഞ്) റിമൂവ് ചെയ്യുന്നു
            setTimeout(() => {
                if (pathToRemove.parentNode) {
                    svg.removeChild(pathToRemove);
                }
            }, 3000); // 1s delay + 2s transition = 3s total
        }

        drawing = false; 
        dragging = false;
        renderHand(e);
    };

    function getCoords(e) {
        const rect = contentLayer.getBoundingClientRect();
        return { 
            x: (e.clientX - rect.left) / scale, 
            y: (e.clientY - rect.top) / scale 
        };
    }

    bgUploader.onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            contentLayer.style.backgroundImage = `url(${event.target.result})`;
            contentLayer.style.backgroundSize = "contain";
            contentLayer.style.backgroundPosition = "center";
            contentLayer.style.backgroundRepeat = "no-repeat";
        }
        reader.readAsDataURL(e.target.files[0]);
    };

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function undo() {
        if (strokes.length > 0) {
            const last = strokes.pop();
            if (last.parentNode) svg.removeChild(last);
        }
    }

    function clearBoard() {
        svg.innerHTML = "";
        strokes = [];
    }
</script>

</body>
</html>
